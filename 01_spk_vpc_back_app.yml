  #    - ","
  #    - - !If [AZ0, !Ref DataSubnet0, !Ref "AWS::NoValue"]
  #      - !If [AZ1, !Ref DataSubnet1, !Ref "AWS::NoValue"]
  #      - !If [AZ2, !Ref DataSubnet2, !Ref "AWS::NoValue"]

