Outputs:
  VpcIdbackam:
    Description: ID of the VPC
    Value: !Ref Vpc

  PublicSubnet0Idbackam:
    Description: ID of the public subnet 1
    Value: !If [AZ0, !Ref PublicSubnet0, "Subnet not created"]

  PublicSubnet1Idbackam:
    Description: ID of the public subnet 2
    Value: !If [AZ1, !Ref PublicSubnet1, "Subnet not created"]

  PublicSubnet2Idbackam:
    Description: ID of the public subnet 3
    Value: !If [AZ2, !Ref PublicSubnet2, "Subnet not created"]

#  DataSubnet0Id:
#    Description: ID of the data subnet 1
#    Value: !If [AZ0, !Ref DataSubnet0, "Subnet not created"]

#  DataSubnet1Id:
#    Description: ID of the data subnet 2
#    Value: !If [AZ1, !Ref DataSubnet1, "Subnet not created"]

#  DataSubnet2Id:
#    Description: ID of the data subnet 3
#    Value: !If [AZ2, !Ref DataSubnet2, "Subnet not created"]

  AppSubnet0Idbackam:
    Description: ID of the app subnet 1
    Value: !If [AZ0, !Ref AppSubnet0, "Subnet not created"]

  AppSubnet1Idbackam:
    Description: ID of the app subnet 2
    Value: !If [AZ1, !Ref AppSubnet1, "Subnet not created"]

  AppSubnet2Idbackam:
    Description: ID of the app subnet 3
    Value: !If [AZ2, !Ref AppSubnet2, "Subnet not created"]
  
  PublicSubnetsbackam:
    Description: A list of the public subnets
    Value: !Join [",", [!Ref PublicSubnet0, !Ref PublicSubnet1]]
  
  AppSubnetsbackam:
    Description: A list of the app subnets
    Value: !Join [",", [!Ref AppSubnet0, !Ref AppSubnet1]]

#  DataSubnets:
#    Description: A list of the Data subnets
#    Value: !Join [",", [!Ref DataSubnet0, !Ref DataSubnet1]]

#  InternetGatewayId:
#    Description: ID of the internet gateway
#    Value: !Ref InternetGateway

  PublicSubnetIdsbackam:
    Description: Comma-separated list of Public subnet IDs
    Value: !Join
      - ","
      - - !If [AZ0, !Ref PublicSubnet0, !Ref "AWS::NoValue"]
        - !If [AZ1, !Ref PublicSubnet1, !Ref "AWS::NoValue"]
        - !If [AZ2, !Ref PublicSubnet2, !Ref "AWS::NoValue"]

  AppSubnetIdsbackam:
    Description: Comma-separated list of App subnet IDs
    Value: !Join
      - ","
      - - !If [AZ0, !Ref AppSubnet0, !Ref "AWS::NoValue"]
        - !If [AZ1, !Ref AppSubnet1, !Ref "AWS::NoValue"]
        - !If [AZ2, !Ref AppSubnet2, !Ref "AWS::NoValue"]

