          - TagEventbackanl
          - TagVerticalbackanl
          - TagTierbackanl
          - TagRegionbackanl

      - Label:
          default: "6.3 Nombre de los Grupos de Seguridad Analitica Back"
        Parameters:
          - sgasganl
          - sgasganladm
          - sgalbanlbck

      - Label: 
          default: "6.4 Datos implementacion ALB - Back Analitica"
        Parameters:
          - Albnameanl
          - ListenerProtocolanl
          - HttpListenerPortanl
          - HttpsListenerPortanl
          - SchemeTypeanl
          - HealthCheckPathanl
          - TGNameanl
          - ACMCertificateanl
          - IngressAllowCidranl

      - Label: 
          default: "6.5 Etiquetas ALB - Back Analitica"
        Parameters:
