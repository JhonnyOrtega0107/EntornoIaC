          - TagEventanl
          - TagVerticalanl
          - TagTieranl
          - TagRegionanl

      - Label:
          default: "6.6 Parámetros del Launch Template ASG Analitica"
        Parameters:
          - LaunchTemplateNameanl
          - InstanceRoleNameanl
          - ImageIdanl
          - InstanceTypeanl
          - KeyNameanl

      - Label: 
          default: "6.7 Parametros ambiente ASG Analitica" 
        Parameters:
          - AutoScalingGroupNameanl
          - MinSizeanl
          - MaxSizeanl
          - DesiredCapacityanl

      - Label: 
          default: "7. Parametros de la plantilla" 
        Parameters:
          - TemplateURL
          - Pathtemplate

#############################################################################################
# ParameterLabels
#############################################################################################
    ParameterLabels:
      # Project
      EnvironmentName:               {default: "Environment"}
      # VPC Hub
      AvailabilityZones:             {default: Availability Zones}
      NumberOfAZs:                   {default: Number of Availability Zones}
      VpcCidr:                       {default: VpcCidr}
      PublichubSubnet0Cidr:          {default: Public Subnet 0}
      PublichubSubnet1Cidr:          {default: Public Subnet 1}
      PublichubSubnet2Cidr:          {default: Public Subnet 2}
      ApphubSubnet0Cidr:             {default: App Subnet 0}
      ApphubSubnet1Cidr:             {default: App Subnet 1}
      ApphubSubnet2Cidr:             {default: App Subnet 2}
      # Etiquetas HUB
      TagCustomer: {default: "Nombre del cliente para el cual se va a implementar el recurso"}
      TagEvent: {default: "Evento en el que se utilizara el recurso"}
      TagVertical: {default: "Vertical a la que pertenecera el recurso"}
      TagTier: {default: "Capa a la que pertenecera el recurso"}
      TagRegion: {default: "Region en la que estara desplegado el recurso"}
