AWSTemplateFormatVersion: "2010-09-09"

Description: "Main Template for the deploy Environment for Cliente by Bextsa"

#############################################################################################
# MetaData
#############################################################################################
Metadata: 
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - 
        Label:
          default: "Project Configuration"
        Parameters:
          - EnvironmentName
      # VPC Hub
      - Label:
          default: "1. Amazon VPC Parameters Hub"
        Parameters:
          - NumberOfAZs
          - AvailabilityZones
          - VpcCidr

      - Label:
          default: "1.1 Amazon Subnets Parameters Hub"
        Parameters:
          - PublichubSubnet0Cidr
          - PublichubSubnet1Cidr
          - PublichubSubnet2Cidr
          - ApphubSubnet0Cidr
          - ApphubSubnet1Cidr
          - ApphubSubnet2Cidr

      - Label:
          default: "1.2 Etiquetas - hub"
        Parameters:
          - TagCustomer
          - TagEvent
          - TagVertical
          - TagTier
          - TagRegion

      - Label:
          default: "1.3 Transit Gateway Parameters"
        Parameters:
          - TransitGatewayNameTag
          - TransitGatewayAsn
          - NumberOfAZshub
          - AvailabilityZoneshub

      - Label:
          default: "1.4 Transit Gateway Options"
        Parameters:
          - AutoAcceptSharedAttachments
          - DefaultRouteTableAssociation
          - DefaultRouteTablePropagation
          - DnsSupportTGW

      - Label:
          default: "1.5 Flow Logs Configuration"
        Parameters:
          - EnableFlowLogstgw
          - FlowLogGroupNametgw

      # VPC front web
      - Label:
          default: "2. Amazon VPC Parameters spoke front"
        Parameters:
          - NumberOfAZsfront
          - AvailabilityZonesfront
          - VpcCidrfront

      - Label:
          default: "2.1 Amazon Subnets Parameters spoke front web"
        Parameters:
          - PublichubSubnet0Cidrfront
          - PublichubSubnet1Cidrfront
          - PublichubSubnet2Cidrfront
          - ApphubSubnet0Cidrfront
          - ApphubSubnet1Cidrfront
          - ApphubSubnet2Cidrfront

      - Label:
          default: "2.2 Etiquetas - front Web"
        Parameters:
          - TagCustomerfront
          - TagEventfront
          - TagVerticalfront
          - TagTierfront
          - TagRegionfront

      - Label:
          default: "2.3 Nombre de los Grupos de Seguridad Web Front"
        Parameters:
          - sgintweb
          - sgasgweb
          - sgasgwebadm
          - sgalbwebfrn

      - Label: 
          default: "2.4 Datos implementacion ALB - Front Web"
        Parameters:
          - Albnamefrn
          - ListenerProtocolfrn
          - HttpListenerPortfrn
          - HttpsListenerPortfrn
          - SchemeTypefrn
          - HealthCheckPathfrn
          - TGNamefrn
          - ACMCertificatefrn
          - IngressAllowCidrfrn

      - Label: 
          default: "2.5 Etiquetas ALB - Front Web"
        Parameters:
          - TagCustomerfrn
          - TagEventfrn
          - TagVerticalfrn
          - TagTierfrn
          - TagRegionfrn

