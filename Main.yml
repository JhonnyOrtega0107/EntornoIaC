      DnsSupportTGW:                 { default: "DNS Support en TGW" }
      EnableFlowLogstgw:             { default: "Activar Flow Logs?" }
      FlowLogGroupNametgw:           { default: "CloudWatch Log Group Name" }
      AvailabilityZoneshub:          {default: "Availability Zones"}
      NumberOfAZshub:                {default: "Number of Availability Zones"}
