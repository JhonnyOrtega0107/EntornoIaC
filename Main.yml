    Description: "Nombre del ALB"

  ListenerProtocolanl:
    Type: String
    AllowedValues: [HTTP, HTTPS]
    Default: HTTP
    Description: "Protocolo para listener"

  HttpListenerPortanl:
    Type: Number
    Default: 80
    Description: "Puerto para listener HTTP"

  HttpsListenerPortanl:
    Type: Number
    Default: 443
    Description: "Puerto para listener HTTPS"

  SchemeTypeanl:
    Type: String
    AllowedValues: [internet-facing, internal]
    Default: internal
    Description: "Scheme del ALB"

  HealthCheckPathanl:
    Type: String
    Default: /
    Description: "Ruta para health checks"

  TGNameanl:
    Type: String
    Default: "tg-ceed-juv-anl-back-dr-eus2"
    Description: "Nombre del TG"

  ACMCertificateanl:
    Type: String
    Default: "arn:aws:acm:us-east-2:752651630425:certificate/142420fb-f6f2-4205-aa6c-a1b5e90009af"
    Description: "ARN del certificado ACM (requerido solo para HTTPS)"

  IngressAllowCidranl:
    Type: String
    Default: 0.0.0.0/0
    Description: "CIDR permitido para ingreso"

  TagCustomeranl:
    Type: String
    Default: ceed
  TagEventanl:
    Type: String
    Default: juv
    AllowedValues: [juv, conpre]
  TagVerticalanl:
    Type: String
    Default: anl
    AllowedValues: [web, movil, anl, pm]
  TagTieranl:
    Type: String
    Default: back
    AllowedValues: [front, back, data]
  TagRegionanl:
    Type: String
    Default: eus2
    AllowedValues: [eus1, eus2, wus1, wus2]

  # Datos Bucket S3 Static Web
  BucketNamefrn:
    Type: String
    Default: "s3-bucket-ceed-juv-dr-static-site"
    Description: "Nombre único del bucket S3."
  InterfaceEndpointNamefrn:
    Type: String
    Default: "s3-interface-endpoint-ceed-juv-dr-static-site"
    Description: "Nombre del VPC Interface Endpoint."
  GatewayEndpointNamefrn:
    Type: String
    Default: "s3-gateway-endpoint-ceed-juv-dr-static-site"
    Description: "Nombre del VPC Gateway Endpoint."
  EnableLifecyclefrn:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: "Indica si se habilitan reglas de ciclo de vida para optimización de costos."

