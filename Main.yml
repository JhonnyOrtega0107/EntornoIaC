      #     - MinSizefw
      #     - MaxSizefw
      #     - DesiredCapacityfw

      # VPC Back web
      - Label:
          default: "3. Amazon VPC Parameters spoke Back web"
        Parameters:
          - NumberOfAZsback
          - AvailabilityZonesback
          - VpcCidrback

      - Label:
          default: "3.1 Amazon Subnets Parameters spoke back web"
        Parameters:
