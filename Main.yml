        Parameters:
          - LaunchTemplateNamebw
          - InstanceRoleNamebw
          - ImageIdbw
          - InstanceTypebw
          - KeyNamebw

      - Label: 
          default: "3.7 Parametros ambiente Autoescalado" 
        Parameters:
          - AutoScalingGroupNamebw
          - MinSizebw
          - MaxSizebw
          - DesiredCapacitybw

      # VPC Data web
      - Label:
          default: "4. Amazon VPC Parameters spoke Data web"
        Parameters:
          - NumberOfAZsdata
          - AvailabilityZonesdata
          - VpcCidrdata

      - Label:
          default: "4.1 Amazon Subnets Parameters spoke Data web"
        Parameters:
          - PublichubSubnet0Cidrdata
          - PublichubSubnet1Cidrdata
          - PublichubSubnet2Cidrdata
          - ApphubSubnet0Cidrdata
          - ApphubSubnet1Cidrdata
          - ApphubSubnet2Cidrdata

      - Label:
          default: "4.2 Etiquetas - Spoke Data Web"
        Parameters:
          - TagCustomerdata
          - TagEventdata
          - TagVerticaldata
          - TagTierdata
          - TagRegiondata

      # VPC Back App Movil
      - Label:
          default: "5. Amazon VPC Parameters spoke backend app movil"
        Parameters:
          - NumberOfAZsbackam
          - AvailabilityZonesbackam
          - VpcCidrbackam

      - Label:
          default: "5.1 Amazon Subnets Parameters spoke backend app movil"
        Parameters:
          - PublichubSubnet0Cidrbackam
          - PublichubSubnet1Cidrbackam
          - PublichubSubnet2Cidrbackam
          - ApphubSubnet0Cidrbackam
          - ApphubSubnet1Cidrbackam
          - ApphubSubnet2Cidrbackam

      - Label:
          default: "5.2 Etiquetas - Spoke Back App Movil"
        Parameters:
          - TagCustomerbackam
          - TagEventbackam
          - TagVerticalbackam
          - TagTierbackam
          - TagRegionbackam

      - Label:
          default: "5.3 Nombre de los Grupos de Seguridad App Movil Back"
        Parameters:
          - sgasgappam
          - sgasgappadmam
          - sgalbappbckam

      - Label: 
          default: "5.4 Datos implementacion ALB - Back App Movil"
        Parameters:
          - Albnameapp
          - ListenerProtocolapp
          - HttpListenerPortapp
          - HttpsListenerPortapp
          - SchemeTypeapp
          - HealthCheckPathapp
          - TGNameapp
          - ACMCertificateapp
          - IngressAllowCidrapp

      - Label: 
          default: "5.5 Etiquetas ALB - Back App Movil"
        Parameters:
          - TagCustomerapp
          - TagEventapp
          - TagVerticalapp
          - TagTierapp
          - TagRegionapp

      - Label:
          default: "5.6 Parámetros del Launch Template ASG"
        Parameters:
          - LaunchTemplateNameapp
          - InstanceRoleNameapp
          - ImageIdapp
          - InstanceTypeapp
          - KeyNameapp

      - Label: 
          default: "5.7 Parametros ambiente Autoescalado" 
        Parameters:
          - AutoScalingGroupNameapp
          - MinSizeapp
          - MaxSizeapp
          - DesiredCapacityapp

      # VPC Back Analitica
      - Label:
          default: "6. Amazon VPC Parameters spoke backend analitica"
        Parameters:
          - NumberOfAZsbackanl
          - AvailabilityZonesbackanl
          - VpcCidrbackanl

      - Label:
          default: "6.1 Amazon Subnets Parameters spoke backend analitica"
        Parameters:
